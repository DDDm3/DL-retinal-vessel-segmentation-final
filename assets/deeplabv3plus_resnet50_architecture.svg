<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111"/>
    </marker>
    <style>
      .line { stroke:#111; stroke-width:2.4; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#111; stroke-width:1.7; fill:none; }
      .dash { stroke:#111; stroke-width:2.2; fill:none; stroke-dasharray:8 7; marker-end:url(#arrow); }
      .brace { stroke:#111; stroke-width:2.2; fill:none; }
      .box { stroke:#111; stroke-width:2.1; fill:#fff; }
      .stage { stroke:#111; stroke-width:2.0; fill:#f8f8f8; }
      .aspp { stroke:#111; stroke-width:1.9; fill:#fff8df; }
      .low { stroke:#111; stroke-width:1.9; fill:#eaf3ff; }
      .head { stroke:#111; stroke-width:1.9; fill:#eef8ee; }
      .title { font: 700 31px "Times New Roman", serif; fill:#111; }
      .section { font: italic 28px "Times New Roman", serif; fill:#111; }
      .label { font: 700 21px Arial, sans-serif; fill:#111; }
      .small { font: 18px Arial, sans-serif; fill:#111; }
      .tiny { font: 15px Arial, sans-serif; fill:#111; }
      .math { font: italic 18px "Times New Roman", serif; fill:#111; }
      .caption { font: italic 25px "Times New Roman", serif; fill:#111; }
    </style>
  </defs>

  <rect width="1800" height="1050" fill="#fff"/>

  <!-- Top scope bars -->
  <path d="M80 105 H930" class="brace"/>
  <path d="M80 94 V116 M930 94 V116" class="brace"/>
  <text x="505" y="82" text-anchor="middle" class="section">Encoder</text>

  <path d="M980 105 H1685" class="brace"/>
  <path d="M980 94 V116 M1685 94 V116" class="brace"/>
  <text x="1332" y="82" text-anchor="middle" class="section">Decoder</text>

  <!-- Input -->
  <rect x="70" y="250" width="125" height="160" class="box"/>
  <text x="132" y="288" text-anchor="middle" class="label">Input</text>
  <text x="132" y="318" text-anchor="middle" class="small">Fundus</text>
  <text x="132" y="348" text-anchor="middle" class="small">Image</text>
  <text x="132" y="388" text-anchor="middle" class="math">B × 3 × H × W</text>

  <!-- Encoder stages -->
  <text x="287" y="160" text-anchor="middle" class="math">H/4 × W/4 × C1</text>
  <rect x="240" y="220" width="95" height="220" class="stage"/>
  <text x="287" y="255" text-anchor="middle" class="label">Stem</text>
  <text x="287" y="285" text-anchor="middle" class="small">Conv</text>
  <text x="287" y="315" text-anchor="middle" class="small">BN</text>
  <text x="287" y="345" text-anchor="middle" class="small">ReLU</text>
  <text x="287" y="390" text-anchor="middle" class="small">MaxPool</text>

  <text x="445" y="160" text-anchor="middle" class="math">H/4 × W/4 × C1</text>
  <rect x="390" y="205" width="110" height="250" class="stage"/>
  <text x="445" y="245" text-anchor="middle" class="label">ResNet50</text>
  <text x="445" y="277" text-anchor="middle" class="label">Layer 1</text>
  <text x="445" y="322" text-anchor="middle" class="small">Low-level</text>
  <text x="445" y="352" text-anchor="middle" class="small">features</text>
  <text x="445" y="397" text-anchor="middle" class="tiny">skip to decoder</text>

  <text x="615" y="160" text-anchor="middle" class="math">H/8 × W/8 × C2</text>
  <rect x="560" y="220" width="110" height="220" class="stage"/>
  <text x="615" y="258" text-anchor="middle" class="label">ResNet50</text>
  <text x="615" y="292" text-anchor="middle" class="label">Layer 2</text>
  <text x="615" y="342" text-anchor="middle" class="small">CNN feature</text>
  <text x="615" y="372" text-anchor="middle" class="small">extraction</text>

  <text x="785" y="160" text-anchor="middle" class="math">H/16 × W/16 × C3</text>
  <rect x="730" y="220" width="110" height="220" class="stage"/>
  <text x="785" y="258" text-anchor="middle" class="label">ResNet50</text>
  <text x="785" y="292" text-anchor="middle" class="label">Layer 3</text>
  <text x="785" y="342" text-anchor="middle" class="small">Deep CNN</text>
  <text x="785" y="372" text-anchor="middle" class="small">features</text>

  <text x="945" y="160" text-anchor="middle" class="math">H/16 × W/16 × C4</text>
  <rect x="895" y="220" width="100" height="220" class="stage"/>
  <text x="945" y="258" text-anchor="middle" class="label">ResNet50</text>
  <text x="945" y="292" text-anchor="middle" class="label">Layer 4</text>
  <text x="945" y="342" text-anchor="middle" class="small">High-level</text>
  <text x="945" y="372" text-anchor="middle" class="small">features</text>

  <!-- ASPP -->
  <text x="1125" y="160" text-anchor="middle" class="math">H/16 × W/16 × 256</text>
  <rect x="1055" y="205" width="140" height="250" class="aspp"/>
  <text x="1125" y="250" text-anchor="middle" class="label">ASPP</text>
  <text x="1125" y="285" text-anchor="middle" class="small">1×1 Conv</text>
  <text x="1125" y="318" text-anchor="middle" class="small">3×3 Atrous</text>
  <text x="1125" y="348" text-anchor="middle" class="small">r = 6, 12, 18</text>
  <text x="1125" y="382" text-anchor="middle" class="small">Image Pool</text>
  <text x="1125" y="417" text-anchor="middle" class="tiny">context module</text>

  <!-- Decoder main -->
  <text x="1315" y="160" text-anchor="middle" class="math">H/4 × W/4 × 256</text>
  <rect x="1260" y="220" width="110" height="220" class="head"/>
  <text x="1315" y="255" text-anchor="middle" class="label">Upsample</text>
  <text x="1315" y="292" text-anchor="middle" class="small">×4</text>
  <text x="1315" y="330" text-anchor="middle" class="small">Concat</text>
  <text x="1315" y="360" text-anchor="middle" class="small">low-level</text>
  <text x="1315" y="390" text-anchor="middle" class="small">features</text>

  <text x="1480" y="160" text-anchor="middle" class="math">H/4 × W/4 × 256</text>
  <rect x="1425" y="220" width="110" height="220" class="head"/>
  <text x="1480" y="255" text-anchor="middle" class="label">Decoder</text>
  <text x="1480" y="292" text-anchor="middle" class="small">Separable</text>
  <text x="1480" y="322" text-anchor="middle" class="small">Conv blocks</text>
  <text x="1480" y="360" text-anchor="middle" class="small">256</text>
  <text x="1480" y="390" text-anchor="middle" class="small">channels</text>

  <text x="1635" y="160" text-anchor="middle" class="math">H × W × 1</text>
  <rect x="1605" y="220" width="60" height="220" class="head"/>
  <text transform="translate(1642 330) rotate(-90)" text-anchor="middle" class="label">1×1 Conv</text>

  <rect x="1695" y="250" width="70" height="160" class="box"/>
  <text x="1730" y="292" text-anchor="middle" class="label">Logits</text>
  <text x="1730" y="326" text-anchor="middle" class="small">[B,1,H,W]</text>
  <text x="1730" y="368" text-anchor="middle" class="tiny">sigmoid</text>
  <text x="1730" y="390" text-anchor="middle" class="tiny">at inference</text>

  <!-- Main arrows -->
  <path d="M195 330 H240" class="line"/>
  <path d="M335 330 H390" class="line"/>
  <path d="M500 330 H560" class="line"/>
  <path d="M670 330 H730" class="line"/>
  <path d="M840 330 H895" class="line"/>
  <path d="M995 330 H1055" class="line"/>
  <path d="M1195 330 H1260" class="line"/>
  <path d="M1370 330 H1425" class="line"/>
  <path d="M1535 330 H1605" class="line"/>
  <path d="M1665 330 H1695" class="line"/>

  <!-- Skip path -->
  <path d="M445 455 C445 585 1125 605 1260 370" class="dash"/>
  <text x="835" y="585" text-anchor="middle" class="small">Low-level skip connection from ResNet50 Layer 1</text>

  <!-- Inset: ASPP detail -->
  <rect x="160" y="660" width="650" height="250" class="box"/>
  <text x="485" y="700" text-anchor="middle" class="label">ASPP detail</text>
  <rect x="205" y="745" width="95" height="95" class="aspp"/>
  <text x="252" y="785" text-anchor="middle" class="small">1×1</text>
  <text x="252" y="812" text-anchor="middle" class="small">Conv</text>
  <rect x="330" y="745" width="110" height="95" class="aspp"/>
  <text x="385" y="775" text-anchor="middle" class="small">3×3 Atrous</text>
  <text x="385" y="805" text-anchor="middle" class="small">rate 6</text>
  <rect x="470" y="745" width="110" height="95" class="aspp"/>
  <text x="525" y="775" text-anchor="middle" class="small">3×3 Atrous</text>
  <text x="525" y="805" text-anchor="middle" class="small">rate 12</text>
  <rect x="610" y="745" width="110" height="95" class="aspp"/>
  <text x="665" y="775" text-anchor="middle" class="small">3×3 Atrous</text>
  <text x="665" y="805" text-anchor="middle" class="small">rate 18</text>
  <path d="M300 792 H330" class="thin"/>
  <path d="M440 792 H470" class="thin"/>
  <path d="M580 792 H610" class="thin"/>
  <text x="485" y="880" text-anchor="middle" class="tiny">Multi-scale context aggregation with atrous convolution</text>

  <!-- Inset: implementation -->
  <rect x="910" y="660" width="700" height="250" class="box"/>
  <text x="1260" y="700" text-anchor="middle" class="label">Binary segmentation adaptation in this project</text>
  <text x="955" y="755" class="small">Library model:</text>
  <text x="1165" y="755" class="small">segmentation_models_pytorch.DeepLabV3Plus</text>
  <text x="955" y="795" class="small">Encoder:</text>
  <text x="1165" y="795" class="small">ResNet50, ImageNet pretrained backbone</text>
  <text x="955" y="835" class="small">Classifier:</text>
  <text x="1165" y="835" class="small">classes = 1, activation = None</text>
  <text x="955" y="875" class="small">Output:</text>
  <text x="1165" y="875" class="small">raw logits, sigmoid used in loss/inference pipeline</text>

  <text x="900" y="990" text-anchor="middle" class="caption">Hình 3.1: Kiến trúc mô hình DeepLabV3+-ResNet50 được sử dụng trong đồ án</text>
</svg>
